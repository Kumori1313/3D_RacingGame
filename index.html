<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Racing Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
  }
  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #cam-label {
    position: absolute;
    top: 24px;
    left: 24px;
    padding: 6px 14px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 3px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #f0f0f0;
    opacity: 0;
    transition: opacity 0.25s ease-out;
  }
  #cam-label.show {
    opacity: 1;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div id="cam-label"></div>
</div>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const canvas = document.getElementById('canvas');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x9cb4c9, 0.0015);

const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();

new RGBELoader()
  .load(
    'https://threejs.org/examples/textures/equirectangular/venice_sunset_1k.hdr',
    (hdr) => {
      const envMap = pmrem.fromEquirectangular(hdr).texture;
      scene.environment = envMap;
      scene.background = envMap;
      hdr.dispose();
      pmrem.dispose();
    }
  );

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(6, 4, 8);

const hemi = new THREE.HemisphereLight(0xffffff, 0x222233, 0.25);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(30, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 120;
sun.shadow.camera.left = -50;
sun.shadow.camera.right = 50;
sun.shadow.camera.top = 50;
sun.shadow.camera.bottom = -50;
sun.shadow.bias = -0.0005;
sun.shadow.normalBias = 0.02;
scene.add(sun);
scene.add(sun.target);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x3a5f2a, roughness: 0.95, metalness: 0.0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const carPlaceholder = new THREE.Mesh(
  new THREE.BoxGeometry(2, 1, 4),
  new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.7 })
);
carPlaceholder.castShadow = true;
carPlaceholder.receiveShadow = true;
scene.add(carPlaceholder);

const wheelMeshes = [];
const wheelGeom = new THREE.CylinderGeometry(0.34, 0.34, 0.3, 20);
wheelGeom.rotateZ(Math.PI / 2);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
for (let i = 0; i < 4; i++) {
  const m = new THREE.Mesh(wheelGeom, wheelMat);
  m.castShadow = true;
  scene.add(m);
  wheelMeshes.push(m);
}

// Visual car state — swapped in when Ferrari GLB loads.
let visualBody = carPlaceholder;
let visualWheels = wheelMeshes;
let chassisVisualOffset = new THREE.Vector3(0, 0, 0);

{
  const draco = new DRACOLoader();
  draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/');
  const gltfLoader = new GLTFLoader();
  gltfLoader.setDRACOLoader(draco);
  gltfLoader.load(
    'https://threejs.org/examples/models/gltf/ferrari.glb',
    (gltf) => {
      const root = gltf.scene;
      // Ferrari GLB is authored facing -Z; our chassis forward is +Z.
      const inner = root.children[0] || root;
      inner.rotation.y = Math.PI;

      root.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      const wheelNames = ['wheel_fl', 'wheel_fr', 'wheel_rl', 'wheel_rr'];
      const newWheels = [];
      for (const name of wheelNames) {
        const w = root.getObjectByName(name);
        if (w) {
          scene.attach(w); // detach from body hierarchy, preserve world xform
          newWheels.push(w);
        }
      }

      scene.add(root);

      carPlaceholder.visible = false;
      for (const m of wheelMeshes) m.visible = false;

      visualBody = root;
      visualWheels = newWheels;
      // Tune: raises body so it sits flush on the wheels at rest.
      chassisVisualOffset = new THREE.Vector3(0, -.85, 0);
    },
    undefined,
    (err) => console.error('Failed to load ferrari.glb', err)
  );
}

// --- Physics ---
const world = new CANNON.World();
world.gravity.set(0, -9.82, 0);
world.broadphase = new CANNON.SAPBroadphase(world);
world.defaultContactMaterial.friction = 0.3;

const groundMat = new CANNON.Material('ground');
const groundBody = new CANNON.Body({ mass: 0, material: groundMat });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

const chassisShape = new CANNON.Box(new CANNON.Vec3(1, 0.5, 2));
const chassisBody = new CANNON.Body({ mass: 1500 });
chassisBody.addShape(chassisShape);
chassisBody.position.set(0, 2, 0);
chassisBody.angularDamping = 0.3;

const vehicle = new CANNON.RaycastVehicle({
  chassisBody,
  indexRightAxis: 0,
  indexForwardAxis: 2,
  indexUpAxis: 1,
});

const wheelOptions = {
  radius: 0.34,
  directionLocal: new CANNON.Vec3(0, -1, 0),
  suspensionStiffness: 30,
  suspensionRestLength: 0.3,
  frictionSlip: 2,
  dampingRelaxation: 2.3,
  dampingCompression: 4.4,
  maxSuspensionForce: 100000,
  rollInfluence: 0.01,
  axleLocal: new CANNON.Vec3(1, 0, 0),
  chassisConnectionPointLocal: new CANNON.Vec3(),
  maxSuspensionTravel: 0.3,
  customSlidingRotationalSpeed: -30,
  useCustomSlidingRotationalSpeed: true,
};

const wheelX = 0.9;
const wheelY = -0.3;
const wheelZFront = 1.15;
const wheelZRear = 1.5;
// Order: FL, FR, RL, RR — front = +z
const connections = [
  [-wheelX, wheelY,  wheelZFront],
  [ wheelX, wheelY,  wheelZFront],
  [-wheelX, wheelY, -wheelZRear],
  [ wheelX, wheelY, -wheelZRear],
];
for (const c of connections) {
  wheelOptions.chassisConnectionPointLocal.set(c[0], c[1], c[2]);
  vehicle.addWheel(wheelOptions);
}
vehicle.addToWorld(world);

// --- Track (procedural) ---
const trackControlPoints = [
  new THREE.Vector3(  0, 0,   0),
  new THREE.Vector3( 60, 0, -25),
  new THREE.Vector3(110, 0,  20),
  new THREE.Vector3( 95, 0,  80),
  new THREE.Vector3( 30, 0, 115),
  new THREE.Vector3(-40, 0, 105),
  new THREE.Vector3(-95, 0,  50),
  new THREE.Vector3(-80, 0, -30),
  new THREE.Vector3(-20, 0, -50),
];
const trackCurve = new THREE.CatmullRomCurve3(trackControlPoints, true, 'catmullrom', 0.5);

const TRACK_SAMPLES = 400;
const TRACK_WIDTH = 18;
const trackCenterline = [];
const trackRightNormals = [];
for (let i = 0; i <= TRACK_SAMPLES; i++) {
  const t = i / TRACK_SAMPLES;
  const p = trackCurve.getPoint(t);
  const tan = trackCurve.getTangent(t).normalize();
  // Right-hand normal in XZ plane
  const rightN = new THREE.Vector3(tan.z, 0, -tan.x).normalize();
  trackCenterline.push(p);
  trackRightNormals.push(rightN);
}

// Road ribbon mesh
{
  const positions = [];
  const uvs = [];
  const indices = [];
  for (let i = 0; i <= TRACK_SAMPLES; i++) {
    const p = trackCenterline[i];
    const n = trackRightNormals[i];
    const hw = TRACK_WIDTH / 2;
    positions.push(p.x - n.x * hw, 0.02, p.z - n.z * hw);
    positions.push(p.x + n.x * hw, 0.02, p.z + n.z * hw);
    uvs.push(0, i * 0.25);
    uvs.push(1, i * 0.25);
    if (i < TRACK_SAMPLES) {
      const a = i * 2;
      indices.push(a, a + 2, a + 1, a + 1, a + 2, a + 3);
    }
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geom.setIndex(indices);
  geom.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color: 0x1c1c1c, roughness: 0.95, metalness: 0.0,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.receiveShadow = true;
  scene.add(mesh);
}

// Dashed centerline
{
  const pts = trackCenterline.map((p) => new THREE.Vector3(p.x, 0.03, p.z));
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const m = new THREE.LineDashedMaterial({ color: 0xffcc00, dashSize: 2, gapSize: 2, linewidth: 2 });
  const line = new THREE.Line(g, m);
  line.computeLineDistances();
  scene.add(line);
}

// Start/finish checkerboard stripe
{
  const cvs = document.createElement('canvas');
  cvs.width = 64; cvs.height = 16;
  const ctx = cvs.getContext('2d');
  for (let x = 0; x < 8; x++) {
    for (let y = 0; y < 2; y++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? '#fff' : '#000';
      ctx.fillRect(x * 8, y * 8, 8, 8);
    }
  }
  const tex = new THREE.CanvasTexture(cvs);
  tex.magFilter = THREE.NearestFilter;
  const geom = new THREE.PlaneGeometry(TRACK_WIDTH, 2.5);
  geom.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85 });
  const m = new THREE.Mesh(geom, mat);
  const p0 = trackCenterline[0];
  const tan0 = trackCurve.getTangent(0);
  m.position.set(p0.x, 0.025, p0.z);
  m.rotation.y = Math.atan2(tan0.x, tan0.z);
  scene.add(m);
}

// Guard rails (visual + physics)
{
  const railH = 1.0;
  const railT = 0.3;
  const railL = 4.0;
  const railMat = new THREE.MeshStandardMaterial({ color: 0xcc2424, roughness: 0.5, metalness: 0.1 });
  const railGeom = new THREE.BoxGeometry(railT, railH, railL);
  const railShape = new CANNON.Box(new CANNON.Vec3(railT / 2, railH / 2, railL / 2));
  const step = 4;
  for (let i = 0; i < TRACK_SAMPLES; i += step) {
    const p = trackCenterline[i];
    const n = trackRightNormals[i];
    const tan = trackCurve.getTangent(i / TRACK_SAMPLES);
    const yaw = Math.atan2(tan.x, tan.z);
    const offset = TRACK_WIDTH / 2 + railT / 2;
    for (const side of [-1, 1]) {
      const px = p.x + n.x * side * offset;
      const pz = p.z + n.z * side * offset;
      const mesh = new THREE.Mesh(railGeom, railMat);
      mesh.position.set(px, railH / 2, pz);
      mesh.rotation.y = yaw;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      const body = new CANNON.Body({ mass: 0 });
      body.addShape(railShape);
      body.position.set(px, railH / 2, pz);
      body.quaternion.setFromEuler(0, yaw, 0);
      world.addBody(body);
    }
  }
}

// Place car at starting line, oriented along the initial tangent
{
  const p0 = trackCenterline[0];
  const tan0 = trackCurve.getTangent(0);
  const yaw0 = Math.atan2(tan0.x, tan0.z);
  chassisBody.position.set(p0.x, 2, p0.z);
  chassisBody.quaternion.setFromEuler(0, yaw0, 0);
  chassisBody.velocity.set(0, 0, 0);
  chassisBody.angularVelocity.set(0, 0, 0);
  camera.position.set(p0.x + 8, 5, p0.z + 10);
}

// --- Input ---
const keys = { forward: false, back: false, left: false, right: false, handbrake: false };
window.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    keys.forward = true; break;
    case 'KeyS': case 'ArrowDown':  keys.back = true; break;
    case 'KeyA': case 'ArrowLeft':  keys.left = true; break;
    case 'KeyD': case 'ArrowRight': keys.right = true; break;
    case 'Space':                    keys.handbrake = true; break;
  }
});
window.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    keys.forward = false; break;
    case 'KeyS': case 'ArrowDown':  keys.back = false; break;
    case 'KeyA': case 'ArrowLeft':  keys.left = false; break;
    case 'KeyD': case 'ArrowRight': keys.right = false; break;
    case 'Space':                    keys.handbrake = false; break;
  }
});

const MAX_STEER = 0.5;
const MAX_FORCE = 2400;
const BRAKE_FORCE = 40;
let currentSteer = 0;

function updateVehicle(dt) {
  const engineForce = keys.forward ? -MAX_FORCE : keys.back ? MAX_FORCE : 0;
  // AWD on wheels 0..3
  for (let i = 0; i < 4; i++) vehicle.applyEngineForce(engineForce, i);

  const coasting = !keys.forward && !keys.back;
  const brake = keys.handbrake ? BRAKE_FORCE : (coasting ? 2 : 0);
  for (let i = 0; i < 4; i++) vehicle.setBrake(brake, i);

  const steerInput = (keys.left ? 1 : 0) - (keys.right ? 1 : 0);
  if (steerInput !== 0) {
    currentSteer += steerInput * dt * 3;
    currentSteer = Math.max(-MAX_STEER, Math.min(MAX_STEER, currentSteer));
  } else {
    const centerRate = dt * 5;
    if (Math.abs(currentSteer) < centerRate) currentSteer = 0;
    else currentSteer -= Math.sign(currentSteer) * centerRate;
  }
  vehicle.setSteeringValue(currentSteer, 0);
  vehicle.setSteeringValue(currentSteer, 1);
}

// --- Cameras ---
const CAM_MODES = ['CHASE', 'HOOD', 'BUMPER', 'COCKPIT', 'CINEMATIC'];
let camModeIdx = 0;
const camLabel = document.getElementById('cam-label');
let camLabelTimer = 0;

function showCamLabel(name) {
  camLabel.textContent = `CAM  ${name}`;
  camLabel.classList.add('show');
  camLabelTimer = 1.0;
}
showCamLabel(CAM_MODES[camModeIdx]);

window.addEventListener('keydown', (e) => {
  if (e.code === 'KeyC') {
    camModeIdx = (camModeIdx + 1) % CAM_MODES.length;
    const mode = CAM_MODES[camModeIdx];
    showCamLabel(mode);
    camera.fov = mode === 'COCKPIT' ? 75 : 60;
    camera.updateProjectionMatrix();
    chaseInit = false;
  }
});

const chasePos = new THREE.Vector3();
const chaseLook = new THREE.Vector3();
let chaseInit = false;
let cinematicT = 0;

const _v1 = new THREE.Vector3();
const _v2 = new THREE.Vector3();
const _v3 = new THREE.Vector3();
const _q1 = new THREE.Quaternion();
const _e1 = new THREE.Euler();
const _m1 = new THREE.Matrix4();
const _up = new THREE.Vector3(0, 1, 0);

function updateCamera(dt, pos, q) {
  const mode = CAM_MODES[camModeIdx];

  _e1.setFromQuaternion(_q1.copy(q), 'YXZ');
  const yawQ = new THREE.Quaternion().setFromAxisAngle(_up, _e1.y);

  if (mode === 'CHASE') {
    const desiredPos = _v1.set(0, 2.3, -6).applyQuaternion(yawQ).add(pos);
    const desiredLook = _v2.set(0, 0.9, 4).applyQuaternion(yawQ).add(pos);
    if (!chaseInit) {
      chasePos.copy(desiredPos);
      chaseLook.copy(desiredLook);
      chaseInit = true;
    }
    const aPos = 1 - Math.exp(-dt / 0.14);
    const aLook = 1 - Math.exp(-dt / 0.09);
    chasePos.lerp(desiredPos, aPos);
    chaseLook.lerp(desiredLook, aLook);
    camera.up.copy(_up);
    camera.position.copy(chasePos);
    camera.lookAt(chaseLook);
  } else if (mode === 'HOOD' || mode === 'BUMPER' || mode === 'COCKPIT') {
    let lx, ly, lz, tx, ty, tz;
    if (mode === 'HOOD')         { lx = 0;    ly = 0.85; lz = 1.2;  tx = 0;    ty = 0.85; tz = 20; }
    else if (mode === 'BUMPER')  { lx = 0;    ly = 0.35; lz = 2.05; tx = 0;    ty = 0.35; tz = 20; }
    else                         { lx = -0.42;ly = 0.7;  lz = 0.15; tx = -0.42;ty = 0.6;  tz = 20; }
    _v1.set(lx, ly, lz).applyQuaternion(q).add(pos);
    _v2.set(tx, ty, tz).applyQuaternion(q).add(pos);
    _v3.set(0, 1, 0).applyQuaternion(q);
    camera.position.copy(_v1);
    _m1.lookAt(_v1, _v2, _v3);
    camera.quaternion.setFromRotationMatrix(_m1);
  } else if (mode === 'CINEMATIC') {
    cinematicT += dt * 0.22;
    const r = 9;
    camera.up.copy(_up);
    camera.position.set(
      pos.x + Math.cos(cinematicT) * r,
      pos.y + 2.6,
      pos.z + Math.sin(cinematicT) * r
    );
    camera.lookAt(pos.x, pos.y + 0.5, pos.z);
  }

  if (camLabelTimer > 0) {
    camLabelTimer -= dt;
    if (camLabelTimer <= 0) camLabel.classList.remove('show');
  }
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();

// Fixed-step physics with render-time interpolation.
const FIXED_STEP = 1 / 60;
let physAccum = 0;
const prevChassisPos = new CANNON.Vec3().copy(chassisBody.position);
const prevChassisQuat = new CANNON.Quaternion().copy(chassisBody.quaternion);
const interpPos = new THREE.Vector3();
const interpQuat = new THREE.Quaternion();
const _chassisQInv = new THREE.Quaternion();
const _tmpQ = new THREE.Quaternion();
const _tmpV = new THREE.Vector3();

// Wheel visual spin: accumulated each render frame from chassis forward speed,
// so wheel rotation is smooth regardless of physics tick rate.
const WHEEL_RADIUS = 0.34;
const _wheelYAxis = new THREE.Vector3(0, 1, 0);
const _wheelXAxis = new THREE.Vector3(1, 0, 0);
const _steerQ = new THREE.Quaternion();
const _rollQ = new THREE.Quaternion();
const _wheelLocalQ = new THREE.Quaternion();
const _forwardWS = new THREE.Vector3();
const wheelRoll = [0, 0, 0, 0];

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  physAccum += dt;
  while (physAccum >= FIXED_STEP) {
    prevChassisPos.copy(chassisBody.position);
    prevChassisQuat.copy(chassisBody.quaternion);
    updateVehicle(FIXED_STEP);
    world.step(FIXED_STEP);
    physAccum -= FIXED_STEP;
  }
  const alpha = Math.min(physAccum / FIXED_STEP, 1);

  interpPos.set(
    prevChassisPos.x + (chassisBody.position.x - prevChassisPos.x) * alpha,
    prevChassisPos.y + (chassisBody.position.y - prevChassisPos.y) * alpha,
    prevChassisPos.z + (chassisBody.position.z - prevChassisPos.z) * alpha
  );
  interpQuat.set(prevChassisQuat.x, prevChassisQuat.y, prevChassisQuat.z, prevChassisQuat.w);
  _tmpQ.set(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w);
  interpQuat.slerp(_tmpQ, alpha);

  visualBody.position.copy(interpPos).add(chassisVisualOffset);
  visualBody.quaternion.copy(interpQuat);

  // Wheel spin: accumulated from chassis forward speed every render frame,
  // so wheels rotate smoothly regardless of physics tick rate (the main
  // source of chase-cam stutter since cannon only updates wheel rotation at 60Hz).
  _forwardWS.set(0, 0, 1).applyQuaternion(interpQuat);
  const velDotForward =
    chassisBody.velocity.x * _forwardWS.x +
    chassisBody.velocity.y * _forwardWS.y +
    chassisBody.velocity.z * _forwardWS.z;
  const rollDelta = (velDotForward / WHEEL_RADIUS) * dt;
  for (let i = 0; i < 4; i++) wheelRoll[i] += rollDelta;

  // Wheel position: re-project chassis-local offset from latest physics tick
  // into the interpolated chassis frame so wheels ride with the visual body.
  _chassisQInv.set(
    chassisBody.quaternion.x, chassisBody.quaternion.y,
    chassisBody.quaternion.z, chassisBody.quaternion.w
  ).invert();
  for (let i = 0; i < visualWheels.length; i++) {
    vehicle.updateWheelTransform(i);
    const t = vehicle.wheelInfos[i].worldTransform;
    _tmpV.set(
      t.position.x - chassisBody.position.x,
      t.position.y - chassisBody.position.y,
      t.position.z - chassisBody.position.z
    ).applyQuaternion(_chassisQInv).applyQuaternion(interpQuat).add(interpPos);
    visualWheels[i].position.copy(_tmpV);

    _steerQ.setFromAxisAngle(_wheelYAxis, vehicle.wheelInfos[i].steering);
    _rollQ.setFromAxisAngle(_wheelXAxis, wheelRoll[i]);
    _wheelLocalQ.copy(_steerQ).multiply(_rollQ);
    _tmpQ.copy(interpQuat).multiply(_wheelLocalQ);
    visualWheels[i].quaternion.copy(_tmpQ);
  }

  updateCamera(dt, interpPos, interpQuat);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
